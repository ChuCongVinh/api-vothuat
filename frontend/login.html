<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký - Karate Trí Đức</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; width: 400px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .logo { text-align: center; color: #dc3545; font-size: 2rem; font-weight: 900; margin-bottom: 20px; font-family: 'Orbitron', sans-serif; }
        
        /* Tabs */
        .tab-group { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; font-weight: bold; color: #777; cursor: pointer; transition: 0.3s; }
        .tab.active { color: #dc3545; border-bottom: 3px solid #dc3545; }
        
        /* Forms */
        .form-area { display: none; }
        .form-area.active { display: block; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group i { position: absolute; left: 15px; top: 14px; color: #aaa; }
        .form-control { width: 100%; padding: 12px 15px 12px 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .form-control:focus { border-color: #dc3545; outline: none; }
        
        .btn-submit { width: 100%; background: #dc3545; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #b02a37; }
        
        .forgot-pass { text-align: right; margin-top: 10px; font-size: 0.9rem; }
        .forgot-pass a { color: #0d6efd; text-decoration: none; cursor: pointer; font-weight: bold; }

        /* Modal Quên mật khẩu */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 350px; text-align: center; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; margin-top: -15px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo"><i class="fa-solid fa-yin-yang"></i> TRÍ ĐỨC</div>
        
        <div class="tab-group">
            <div class="tab active" onclick="switchTab('login')">ĐĂNG NHẬP</div>
            <div class="tab" onclick="switchTab('register')">ĐĂNG KÝ</div>
        </div>

        <div id="loginArea" class="form-area active">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-submit">Đăng Nhập</button>
                <div class="forgot-pass"><a onclick="openForgotModal()">Bạn quên mật khẩu?</a></div>
            </form>
        </div>

        <div id="registerArea" class="form-area">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <i class="fa-solid fa-address-card"></i>
                    <input type="text" id="regFullname" class="form-control" placeholder="Họ và tên thật" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="regUsername" class="form-control" placeholder="Tên tài khoản (để đăng nhập)" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="regEmail" class="form-control" placeholder="Email khôi phục" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPassword" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-submit" style="background:#0d6efd;">Tạo Tài Khoản</button>
            </form>
        </div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeForgotModal()">&times;</span>
            <h2 style="color:#dc3545; margin-bottom:10px;"><i class="fa-solid fa-key"></i> Lấy lại mật khẩu</h2>
            <p style="color:#666; font-size:14px; margin-bottom:20px;">Nhập Email bạn đã đăng ký. Hệ thống sẽ cấp một mật khẩu mới gửi vào hòm thư của bạn.</p>
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="Nhập Email của bạn" required>
                </div>
                <button type="submit" class="btn-submit" id="btnForgot">Gửi Mật Khẩu Mới</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api'; // Đường dẫn Backend (Dùng trên Render)

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-area').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginArea').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerArea').classList.add('active');
            }
        }

        function openForgotModal() { document.getElementById('forgotModal').style.display = 'flex'; }
        function closeForgotModal() { document.getElementById('forgotModal').style.display = 'none'; }

        // 1. XỬ LÝ ĐĂNG NHẬP
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    // LƯU CẢ ID, TÊN VÀ VAI TRÒ VÀO BỘ NHỚ
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userId', data.id); // QUAN TRỌNG: Lưu ID cho Trang Profile
                    localStorage.setItem('currentUser', username);
                    localStorage.setItem('userFullname', data.fullname);
                    localStorage.setItem('role', data.role);
                    
                    alert(`Đăng nhập thành công! Xin chào ${data.fullname}`);
                    
                    // Chuyển hướng
                    if (data.role === 'admin') window.location.href = 'admin.html';
                    else window.location.href = 'index.html'; // Học viên về Trang chủ
                } else {
                    alert(data.message || "Tài khoản hoặc mật khẩu không đúng!");
                }
            } catch (err) { alert("Lỗi kết nối đến máy chủ!"); }
        }

        // 2. XỬ LÝ ĐĂNG KÝ (Có gửi thêm Email)
        async function handleRegister(e) {
            e.preventDefault();
            const fullname = document.getElementById('regFullname').value;
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                // Gọi API Thêm User của bạn, gộp thêm email vào tham số note tạm thời (hoặc cấu hình gửi riêng nếu Backend đã có cột email)
                const res = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        fullname, username, password, 
                        role: 'student', 
                        status: 'Chính thức', 
                        note: `Email: ${email}` // Tạm lưu Email vào phần Note nếu Form backend gốc chưa update
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("Đăng ký thành công! Vui lòng đăng nhập.");
                    switchTab('login');
                } else {
                    alert(data.message || "Username này đã có người sử dụng!");
                }
            } catch (err) { alert("Lỗi kết nối đến máy chủ!"); }
        }

        // 3. XỬ LÝ QUÊN MẬT KHẨU
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const btn = document.getElementById('btnForgot');
            
            btn.innerText = "Đang gửi Email...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    alert("Thành công! Mật khẩu mới đã được gửi vào Email của bạn.");
                    closeForgotModal();
                } else {
                    alert(data.message);
                }
            } catch (err) { 
                alert("Lỗi kết nối hệ thống gửi Mail!"); 
            } finally {
                btn.innerText = "Gửi Mật Khẩu Mới";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
